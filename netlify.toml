[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables are now configured in Netlify Dashboard
# This allows different values for different environments (preview, production)
# Go to: Site settings > Environment variables

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
